name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Note: Replace 'yourdockerhubusername' with actual repository namespace below
          # A good practice is to use the github repository name: ${{ github.repository }} if it matches your Docker Hub repo
          # Or define a custom secret / env variable for the image name.
          tags: ${{ secrets.DOCKER_USERNAME }}/fastapi-devops-project:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Pull the latest image from Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/fastapi-devops-project:latest
            
            # Stop and remove the existing container if it exists
            docker stop fastapi-app || true
            docker rm fastapi-app || true
            
            # Run the new container
            # Mapping host port 80 to container port 8000
            docker run -d --name fastapi-app -p 80:8000 ${{ secrets.DOCKER_USERNAME }}/fastapi-devops-project:latest
